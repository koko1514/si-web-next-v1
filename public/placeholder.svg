<svg width="400" height="500" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/> <!-- slate-800 -->
      <stop offset="100%" stop-color="#0f172a"/> <!-- slate-900 -->
    </linearGradient>
    
    <!-- Avatar Fill Gradient -->
    <linearGradient id="avatar-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8"/> <!-- slate-400 -->
      <stop offset="100%" stop-color="#475569"/> <!-- slate-600 -->
    </linearGradient>
    
    <!-- Accent Ring Gradient -->
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/> <!-- amber-600 -->
      <stop offset="100%" stop-color="#f59e0b"/> <!-- amber-500 -->
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="url(#bg-grad)"/>

  <!-- Decorative subtle background patterns -->
  <circle cx="200" cy="200" r="180" stroke="white" stroke-opacity="0.03" stroke-width="2"/>
  <circle cx="200" cy="200" r="140" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <circle cx="200" cy="200" r="100" stroke="url(#ring-grad)" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="4 8"/>

  <!-- Avatar Group -->
  <g transform="translate(0, 40)">
    <!-- Head -->
    <circle cx="200" cy="180" r="55" fill="url(#avatar-grad)"/>
    
    <!-- Body/Shoulders -->
    <path d="M100 360 C 100 290, 140 260, 200 260 C 260 260, 300 290, 300 360 Z" fill="url(#avatar-grad)"/>
    
    <!-- Tie / Collar Detail -->
    <path d="M185 260 L200 290 L215 260 Z" fill="#334155"/>
    <path d="M194 285 L206 285 L203 330 L197 330 Z" fill="#64748b"/>
  </g>
  
  <!-- Subtle academic icon in corner -->
  <path d="M350 40 L370 50 L350 60 L330 50 Z M330 50 V70 C330 75, 370 75, 370 70 V50 M350 60 V78" stroke="white" stroke-opacity="0.1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
